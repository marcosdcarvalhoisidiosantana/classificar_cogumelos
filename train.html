<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Treinamento da IA - Cogumelos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-vis"></script>
</head>
<body class="bg-light">
    <div class="card shadow p-4">
        <h2 class="text-primary">Treinamento da IA - Cogumelos</h2>
        <p>Selecione o arquivo <strong>mushrooms.csv</strong> para começar:</p>
        <div class="mb-3">
            <input class="form-control" type="file" id="csv-file" accept=".csv">
        </div>
        <div class="d-flex gap-2">
            <button id="btn-treinar" class="btn btn-success" disabled>Iniciar Treino</button>
            <a href="index.html" class="btn btn-outline-secondary">Voltar ao Formulário</a>
        </div>
        <div id="status" class="mt-3 fw-bold text-secondary"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
